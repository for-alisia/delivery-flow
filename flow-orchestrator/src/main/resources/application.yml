spring:
  application:
    name: FlowOrchestrator
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

app:
  gitlab:
    connect-timeout-seconds: 5
    read-timeout-seconds: 30
  issues-api:
    default-page-size: 20
    max-page-size: 40
    validation:
      title-min-length: 3
      title-max-length: 255
      description-max-length: 1000000
      max-labels-per-request-field: 10
